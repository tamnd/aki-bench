name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  real-bench:
    name: tiny real benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: install redis and valkey
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server valkey-server || sudo apt-get install -y redis-server
      - name: build aki-bench
        run: go build -o aki-bench ./cmd/aki-bench
      - name: smoke check against redis and valkey
        run: ./aki-bench -smoke || true
      - name: tiny load run
        run: ./aki-bench -workload set -connections 8 -pipeline 4 -duration 2s -json results.json || true
      - name: upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: results.json
          if-no-files-found: ignore
